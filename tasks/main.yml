---
# tasks file for httpd

- name: Install Apache web server
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes

- name: Copy website index file
  ansible.builtin.copy:
    src: index.html
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'

- name: Ensure Apache service is running and enabled
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: yes
